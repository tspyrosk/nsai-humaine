events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8888;
        client_max_body_size 2048m;
        absolute_redirect off;

        # entrypoint.sh drops a rule here when NB_PREFIX is set: some Istio
        # setups strip /notebook/<ns>/<name> before the request reaches the pod,
        # so stripped /jupyter/* paths get the prefix re-added to match base_url
        include /etc/nginx/nb-prefix/*.conf;

        # /jupyter/ locally, /notebook/<ns>/<name>/jupyter/ behind Kubeflow;
        # the full path is passed through, Jupyter's base_url matches it via NB_PREFIX
        # which image build is running; reachable at any prefix, e.g. /notebook/<ns>/<name>/build-info
        location ~ /build-info$ {
            default_type text/plain;
            alias /app/build-info;
        }

        # jupyter process log, for debugging without cluster access
        location ~ /debug/jupyter-log$ {
            default_type text/plain;
            alias /app/jupyter.log;
        }

        location ~ ^.*/jupyter$ {
            return 302 $uri/;
        }

        location ~ ^.*/jupyter/ {
            proxy_pass http://127.0.0.1:8889;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://127.0.0.1:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }
    }
}
